name: Deploy to Sakura

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          # 本番APIエンドポイント(同一オリジン配置なので相対パスでも動くが、明示しておく)
          VITE_RANKING_API_URL: https://code-injection.tompython.com/server/rank.php

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy static assets (dist/)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 30;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u \$FTP_USERNAME,\$FTP_PASSWORD \$FTP_SERVER;
            mirror --reverse --delete --verbose --parallel=3 --exclude-glob server/ ./dist/ \$FTP_SERVER_DIR;
            quit;
          "

      - name: Deploy PHP backend (server/, data/ を除外して既存のランキングデータを保護)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set net:timeout 30;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            open -u \$FTP_USERNAME,\$FTP_PASSWORD \$FTP_SERVER;
            mirror --reverse --verbose --exclude-glob data/ ./server/ \$FTP_SERVER_DIR/server;
            quit;
          "
